<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Gaming · Donovan</title>

    <link rel="stylesheet" href="css/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="app-container">

        <header>
            <div class="header-content">
                <h1>Hub Gaming</h1>
                <p>Explorez la base de données mondiale des jeux vidéo en temps réel</p>
            </div>

            <div class="search-bar">
                <input type="text" id="search-input" placeholder="Rechercher un jeu (ex: No Man's Sky, Wuthering Waves...)" autocomplete="off">
                <button id="search-button">Rechercher</button>
            </div>
        </header>

        <main>
            <div id="games-grid" class="games-grid">
                <div class="status-message">Chargement de l'univers gaming...</div>
            </div>
        </main>

        <div id="game-modal" class="modal hidden">
            <div class="modal-content">
                <span id="close-modal" class="close-btn">&times;</span>
                <div id="modal-body">                    
                    </div>
            </div>
        </div>

        <footer>
            <p>Développé par Donovan · Données propulsées par l'API RAWG</p>
        </footer>

    </div>

    <script src="js/api.js"></script>
    <script src="js/dom.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
